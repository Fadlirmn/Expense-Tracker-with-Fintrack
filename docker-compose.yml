version: '3.8'

services:
  dashboard:
    build: .
    container_name: expense_tracker_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATA_FILE=data/expenses_log.json
      - FINTRACK_API_URL=${FINTRACK_API_URL}
      - FINTRACK_API_KEY=${FINTRACK_API_KEY}
      - DEFAULT_FINTRACK_USER_ID=${DEFAULT_FINTRACK_USER_ID}
    networks:
      - fintrack-net
    restart: unless-stopped

  telegram-bot:
    build: .
    container_name: expense_tracker_bot
    command: python bot.py
    volumes:
      - ./data:/app/data
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ALLOWED_TELEGRAM_USER_IDS=${ALLOWED_TELEGRAM_USER_IDS}
      - DATA_FILE=data/expenses_log.json
      - FINTRACK_API_URL=${FINTRACK_API_URL}
      - FINTRACK_API_KEY=${FINTRACK_API_KEY}
    networks:
      - fintrack-net
    restart: unless-stopped

networks:
  fintrack-net:
    external: true
    name: fintrack-network
