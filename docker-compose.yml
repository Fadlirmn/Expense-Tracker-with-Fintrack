version: '3.8'

services:
  dashboard:
    build: .
    container_name: expense_tracker_dashboard
    ports:
      - "127.0.0.1:8501:8501"  # lokal only — akses via SSH tunnel jika perlu
    volumes:
      - ./data:/app/data
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATA_FILE=data/expenses_log.json
      - FINTRACK_API_URL=${FINTRACK_API_URL}
      - GATEWAY_API_KEY=${GATEWAY_API_KEY}
      - DEFAULT_FINTRACK_USER_ID=${DEFAULT_FINTRACK_USER_ID}
    networks:
      - fintrack-net
    restart: unless-stopped

  expense-tracker-api:
    build: .
    container_name: expense-tracker-api
    command: python api.py
    network_mode: host
    volumes:
      - ./data:/app/data
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PORT=8000
      - FINTRACK_API_URL=http://localhost:8080
    restart: unless-stopped

networks:
  fintrack-net:
    external: true
    name: fintrack-network
